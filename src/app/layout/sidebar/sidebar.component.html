<aside class="sidebar" [class.sidebar--collapsed]="isCollapsed">
  <button class="sidebar-toggle" type="button" (click)="toggleSidebar()">
    <i class="bi bi-list"></i>
  </button>

  <!-- Encabezado de marca -->
  <header class="sidebar-header">
    @if (!isCollapsed) {
      <div class="sidebar-brand">
        <span class="brand-name">POSITIVO</span>
        <span class="brand-symbol">S+</span>
      </div>

      <p class="sidebar-system-name">Facturación IA</p>
    }

    @if (isCollapsed) {
      <div class="sidebar-brand-collapsed">
        <span class="brand-name">P</span>
        <span class="brand-symbol">S+</span>
      </div>
    }
  </header>

  <!-- Información temporal del usuario -->
  <section class="sidebar-user">
    <div class="user-avatar" aria-hidden="true">U</div>

    @if (!isCollapsed) {
      <div class="user-information">
        <span class="user-name">Usuario</span>
        <span class="user-role">Usuario del sistema</span>
      </div>
    }
  </section>

  <!-- Menú principal -->
  <nav class="sidebar-navigation" aria-label="Navegación principal">
    @if (!isCollapsed) {
      <p class="navigation-title">Menú</p>
    }

    <a
      class="navigation-item"
      routerLink="/dashboard"
      routerLinkActive="navigation-item-active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <span class="navigation-icon">
        <i class="bi bi-grid-1x2-fill"></i>
      </span>
      @if (!isCollapsed) {
        <span>Panel principal</span>
      }
    </a>

    <a
      class="navigation-item"
      routerLink="/dashboard/usuarios-externos"
      routerLinkActive="navigation-item-active"
    >
      <span class="navigation-icon">
        <i class="bi bi-people-fill"></i>
      </span>
      @if (!isCollapsed) {
        <span>Gestión de usuarios externos</span>
      }
    </a>
  </nav>

  <!-- Zona inferior del menú -->
  <footer class="sidebar-footer">
    <button
      class="btn btn-logout logout-button"
      type="button"
      aria-label="Cerrar sesión"
      (click)="logout()"
    >
      <span class="logout-icon">
        <i class="bi bi-box-arrow-right"></i>
      </span>
      @if (!isCollapsed) {
        <span>Cerrar sesión</span>
      }
    </button>
  </footer>
</aside>
