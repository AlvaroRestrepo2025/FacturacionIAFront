<main class="login-page">
  <section class="login-card">
    <div class="login-brand">
      <span class="brand-name">POSITIVO</span>
      <span class="brand-symbol">S+</span>
    </div>

    <header class="login-header">
      <p class="login-eyebrow">Facturación IA</p>

      <h1>Iniciar sesión</h1>

      <p class="login-description">
        Ingresa tus credenciales para acceder a la aplicación.
      </p>

      @if (logoutMessage) {
        <div class="logout-message">
          <strong>{{ logoutMessage }}</strong>
        </div>
      }
    </header>

    <form class="login-form">
      <div class="form-group">
        <label class="form-label" for="username">
          Usuario
        </label>

        <input
          id="username"
          class="form-control"
          type="text"
          name="username"
          placeholder="Ingresa tu usuario"
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">
          Contraseña
        </label>

        <input
          id="password"
          class="form-control"
          type="password"
          name="password"
          placeholder="Ingresa tu contraseña"
          autocomplete="current-password"
        />
      </div>

      <button
        class="btn btn-primary login-button"
        type="button"
        (click)="temporaryLogin()"
      >
        Ingresar
      </button>
    </form>
  </section>
</main>
